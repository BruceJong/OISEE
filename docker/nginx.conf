user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server_tokens off;
    client_max_body_size 25m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    upstream oisee_api { server api:3000; }

    # 同一 server 同时服务 HTTP(80) 与 HTTPS(443)：
    #   - 80：可直接访问 + 提供 Let's Encrypt 续期验证（/.well-known/acme-challenge/）
    #   - 443：oisee.online 的 HTTPS（证书由 acme/certbot 签发，挂载到 /etc/nginx/ssl）
    server {
        listen 80;
        listen 443 ssl http2;
        server_name oisee.online www.oisee.online _;

        ssl_certificate     /etc/nginx/ssl/oisee.online.crt;
        ssl_certificate_key /etc/nginx/ssl/oisee.online.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Let's Encrypt 续期（webroot）
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        # 用户端 SPA（@oisee/web，base=/）
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 管理端 SPA（@oisee/cms，base=/cms/）
        location = /cms { return 301 /cms/; }
        location /cms/ {
            alias /usr/share/nginx/html/cms/;
            try_files $uri /cms/index.html;
        }
        location /cms/assets/ {
            alias /usr/share/nginx/html/cms/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 后端 API（NestJS 全局前缀 /api/v1）
        location /api/ {
            proxy_pass         http://oisee_api/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # 媒体：经 API（本地未命中回退 OSS）
        location /uploads/ { proxy_pass http://oisee_api/uploads/; }
        location /video/   { proxy_pass http://oisee_api/video/; }

        # 健康检查
        location = /health {
            proxy_pass http://oisee_api/api/v1/health;
            access_log off;
        }
    }
}
