user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server_tokens off;

    # 当前为本机磁盘存储：上传经 API 落盘，需放宽请求体（multer 限 20MB）
    # 之后切到 OSS 直传后，可调回 5m
    client_max_body_size 25m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    upstream oisee_api { server api:3000; }

    # ===== 主入口（HTTP）=====
    # 备案+证书前先用 ECS 公网 IP 直接访问；server_name _ 接收任意 Host
    server {
        listen 80;
        server_name _;

        # 用户端 SPA（@oisee/web，base=/）
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 管理端 SPA（@oisee/cms，base=/cms/）
        location = /cms { return 301 /cms/; }
        location /cms/ {
            alias /usr/share/nginx/html/cms/;
            try_files $uri /cms/index.html;
        }
        location /cms/assets/ {
            alias /usr/share/nginx/html/cms/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 后端 API（NestJS 全局前缀 /api/v1）
        location /api/ {
            proxy_pass         http://oisee_api/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # 媒体：本机磁盘，经 API 的 serve-static 回源
        location /uploads/ { proxy_pass http://oisee_api/uploads/; }
        location /video/   { proxy_pass http://oisee_api/video/; }

        # 健康检查
        location = /health {
            proxy_pass http://oisee_api/api/v1/health;
            access_log off;
        }
    }

    # ============================================================
    # 备案完成 + 拿到 SSL 证书后启用 HTTPS：
    #   1) 把证书放到 /opt/oisee/data/nginx/ssl/（compose 已挂载到 /etc/nginx/ssl）
    #   2) 取消下面注释，替换 oisee.com 为你的域名
    #   3) 把上面 `listen 80; server_name _;` 那段改成 80→443 跳转
    # ============================================================
    # server {
    #     listen 80;
    #     server_name oisee.com www.oisee.com;
    #     return 301 https://$host$request_uri;
    # }
    # server {
    #     listen 443 ssl http2;
    #     server_name oisee.com;
    #     ssl_certificate     /etc/nginx/ssl/oisee.com.crt;
    #     ssl_certificate_key /etc/nginx/ssl/oisee.com.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     # …… 把上面 HTTP server 里的 location 块原样复制进来 ……
    # }
}
